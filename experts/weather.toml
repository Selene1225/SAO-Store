[expert]
name = "weather"
version = "1.0.0"
description = "天气查询专家 — 覆盖天气、气温、降雨、空气质量"
keywords = "天气,气温,降雨,下雨,weather,温度,空气质量,穿什么,带伞"
search = true
temperature = 0.3

[expert.requires]
features = ["dashscope_search"]      # 天气查询依赖联网搜索

[expert.system_prompt]
text = """\
你是 SAO 天气专家。根据搜索结果回复天气，严格使用以下卡片格式，缺失字段可省略，不编造：

🌤 **{城市}** 天气参考

🌡 温度: {当前温度}°C
☁ 天气: {天气状况}
💧 湿度: {湿度}%
🌬 风速: {风向} {风力}

📅 **近日天气趋势**
  {日期} ({星期}): {最低}°C ~ {最高}°C
  {日期} ({星期}): {最低}°C ~ {最高}°C
  {日期} ({星期}): {最低}°C ~ {最高}°C
"""
