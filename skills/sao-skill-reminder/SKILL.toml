[skill]
name = "reminder"
version = "1.0.0"
description = "管理提醒/闹钟：创建、查看、更新、取消"
keywords = "提醒,闹钟,定时,reminder,alarm,提醒我,别忘了,到点"
author = "Selene"
weight = 1                     # 1~10 数值，越大越重。SAO 据此决定主 Agent 直调还是派 SubAgent
                               # 1~3: 轻量，主 Agent 同步直调（秒级，单次调用）
                               # 4~6: 中等，视情况决定
                               # 7~10: 重量，SubAgent 异步盯着（分钟~小时级，多轮交互）

[skill.requires]
sao = ">=2.0.0"
env = ["FEISHU_BITABLE_APP_TOKEN", "FEISHU_BITABLE_REMINDER_TABLE_ID"]  # 必需环境变量
bins = []                            # 无外部二进制依赖
features = ["feishu"]                # SAO 功能开关（对应 config.toml [features]）

# ── Tools 定义（SAO 读取后注入 Router prompt）──

[[tools]]
name = "set"
description = "创建新提醒/闹钟"

[tools.args.content]
type = "string"
required = true
description = "提醒内容"

[tools.args.remind_time]
type = "string"
required = true
description = "提醒时间，格式 YYYY-MM-DD HH:mm"

[[tools]]
name = "list"
description = "查看待执行的提醒"

[[tools]]
name = "update"
description = "更新提醒内容或时间"

[tools.args.keyword]
type = "string"
required = true
description = "关键词匹配提醒"

[tools.args.new_content]
type = "string"
required = false
description = "新提醒内容"

[tools.args.new_time]
type = "string"
required = false
description = "新提醒时间 YYYY-MM-DD HH:mm"

[[tools]]
name = "cancel"
description = "取消待执行的提醒"

[tools.args.keyword]
type = "string"
required = true
description = "关键词匹配提醒"

# ── 示例（帮助 Router 理解意图）──

[[examples]]
user = "3月10号下午3点提醒我开会"
tool = "set"
args = { content = "开会", remind_time = "2026-03-10 15:00" }

[[examples]]
user = "查看我的提醒"
tool = "list"

[[examples]]
user = "把开会那个提醒改成8点"
tool = "update"
args = { keyword = "开会", new_time = "2026-03-10 08:00" }

[[examples]]
user = "取消开会的提醒"
tool = "cancel"
args = { keyword = "开会" }
